<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Summer Player</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="player">
    <img src="retro.jpg" alt="Carátula retro" class="cover" />

    <h1 class="title">Summer</h1>

    <audio id="audio" src="summer.mp3" preload="metadata"></audio>

    <div class="controls">
      <button id="playBtn" class="btn" aria-label="Reproducir">▶</button>
      <button id="pauseBtn" class="btn" aria-label="Pausar">⏸</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
