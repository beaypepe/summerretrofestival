<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Summer Player</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="player">
    <img src="retro.jpg" alt="Carátula retro" class="cover" />

    <audio id="audio" src="summer.mp3" preload="metadata"></audio>

    <div class="controls">
      <button id="playPauseBtn" class="btn" aria-label="Reproducir">▶</button>
      <div class="timeline">
        <input type="range" id="seek" class="seek" min="0" max="100" value="0" step="0.1" aria-label="Buscar posición de la canción" />
        <div class="time-row">
          <span id="current">0:00</span>
          <span id="duration">0:00</span>
        </div>
      </div>
    </div>

    <p class="footer-text">
      <a href="https://coord.info/GCBT5JW" target="_blank" rel="noopener noreferrer">Summer Retro Festival</a>
      - un caché de
      <a href="https://beaypepe.com" target="_blank" rel="noopener noreferrer">BeayPepe</a>
    </p>
  </main>

  <script src="script.js"></script>
</body>
</html>
